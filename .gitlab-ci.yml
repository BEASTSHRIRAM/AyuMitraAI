stages:
  - lint
  - test
  - build

backend-lint:
  stage: lint
  image: python:3.12
  script:
    - pip install ruff
    - ruff check backend/
  allow_failure: true

backend-test:
  stage: test
  image: python:3.12
  script:
    - cd backend
    - pip install -r requirements.txt
    - pip install pytest
    - pytest -q || echo "No tests found yet"
  allow_failure: true

frontend-build:
  stage: build
  image: node:18
  cache:
    key: frontend-deps
    paths:
      - frontend/node_modules/
  script:
    - cd frontend
    - npm ci --legacy-peer-deps
    - npm run build
